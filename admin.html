<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Motion Graphic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            accent: '#7dd329',
                            dark: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #7dd329;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Loading Overlay -->
    <div id="loading-overlay"
        class="fixed inset-0 bg-white/80 backdrop-blur flex flex-col items-center justify-center z-50">
        <div class="loader mb-4 w-10 h-10 border-4"></div>
        <p class="text-slate-500 font-medium animate-pulse">Checking authentication...</p>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl hidden">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black italic font-['Playfair_Display'] text-slate-900 mb-1">Admin <span
                    class="text-brand-accent">Login</span></h1>
            <p class="text-slate-500 text-sm">Sign in to manage your products</p>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="login-email" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-brand-accent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="login-password" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-brand-accent outline-none transition-all">
            </div>
            <p id="login-error" class="text-red-500 text-xs hidden"></p>
            <button type="submit"
                class="w-full bg-brand-accent hover:bg-[#6bc020] text-white font-bold py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2">
                <span id="login-btn-text">Sign In</span>
                <div id="login-spinner" class="loader hidden" style="width: 16px; height: 16px; border-width: 2px;">
                </div>
            </button>
        </form>
    </div>

    <!-- Admin Dashboard Section -->
    <div id="admin-section" class="w-full max-w-4xl hidden flex-col h-[90vh]">
        <!-- Header -->
        <div
            class="bg-white p-4 rounded-t-2xl shadow-sm border-b border-slate-100 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <i class='bx bx-shield-quarter text-3xl text-brand-accent'></i>
                <div>
                    <h1 class="font-bold text-lg text-slate-900 leading-tight">Admin Dashboard</h1>
                    <p class="text-xs text-slate-500">Motion Graphic Studio</p>
                </div>
            </div>
            <button id="logout-btn"
                class="text-sm font-medium text-slate-500 hover:text-red-500 transition-colors flex items-center gap-1">
                <i class='bx bx-log-out'></i> Logout
            </button>
        </div>

        <!-- Main Content -->
        <div class="bg-white p-6 rounded-b-2xl shadow-xl flex-grow overflow-y-auto">
            <h2 class="text-lg font-bold text-slate-800 mb-6 border-b border-slate-100 pb-2">Add New Product</h2>

            <form id="add-product-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Left Column -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Product Title</label>
                            <input type="text" id="p-title" required placeholder="e.g. Soft Pattern Invite"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-accent focus:bg-white outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Product Code</label>
                            <input type="text" id="p-code" required placeholder="e.g. WCA601"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-accent focus:bg-white outline-none transition-all uppercase">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Old Price (Rs.)</label>
                                <input type="number" id="p-old-price" required placeholder="60"
                                    class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-accent focus:bg-white outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">New Price (Rs.)</label>
                                <input type="number" id="p-new-price" required placeholder="40"
                                    class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-accent focus:bg-white outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Category</label>
                            <select id="p-category" required
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-accent focus:bg-white outline-none transition-all">
                                <option value="wedding">Wedding Cards</option>
                                <option value="social">Social Media</option>
                                <option value="business">Business Cards</option>
                                <option value="packaging">Packaging / Boxes</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Tag / Size (Shows on
                                badge)</label>
                            <input type="text" id="p-tag" required placeholder="e.g. A6 Size, Promo, Box"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-accent focus:bg-white outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Product Image</label>
                            <div
                                class="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center hover:bg-slate-50 transition-colors relative">
                                <input type="file" id="p-image" required accept="image/*"
                                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                                <i class='bx bx-image-add text-3xl text-slate-400 mb-1'></i>
                                <p class="text-xs text-slate-500 font-medium">Click or drag image here</p>
                                <p id="file-name" class="text-xs text-brand-accent mt-1 hidden font-bold"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div id="upload-progress-container" class="hidden w-full bg-slate-100 rounded-full h-2.5 mt-4">
                    <div id="upload-progress" class="bg-brand-accent h-2.5 rounded-full" style="width: 0%"></div>
                </div>
                <p id="form-message" class="text-sm font-medium text-center hidden pt-2"></p>

                <div class="pt-4 border-t border-slate-100 flex justify-end">
                    <button type="submit" id="submit-btn"
                        class="bg-brand-accent hover:bg-[#6bc020] text-white font-bold py-2.5 px-8 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-md">
                        <span id="submit-btn-text">Add Product</span>
                        <div id="submit-spinner" class="loader hidden"
                            style="width: 16px; height: 16px; border-width: 2px;"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        // Update file name display
        document.getElementById('p-image').addEventListener('change', function (e) {
            const fileName = document.getElementById('file-name');
            if (this.files[0]) {
                fileName.textContent = this.files[0].name;
                fileName.classList.remove('hidden');
            } else {
                fileName.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
